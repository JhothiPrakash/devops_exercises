apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-app-external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: final-k8s-secret # This is the standard K8s secret that gets generated
  dataFrom:
  - extract:
      key: app-secrets # This must exactly match the name in AWS Secrets Manager