apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/JhothiPrakash/eks-gitops-payment-service.git'
    path: payment-service
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
