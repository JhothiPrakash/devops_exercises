apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dynamodb-app
  template:
    metadata:
      labels:
        app: dynamodb-app
    spec:
      serviceAccountName: dynamodb-app-sa
      containers:
      - name: app
        image: 866252497011.dkr.ecr.us-east-1.amazonaws.com/dynamodb-app:v1
        ports:
        - containerPort: 3000